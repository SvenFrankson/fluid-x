<h1>
    <span class="white-stroke">CARILLION</span>
    <span class="content-version white-stroke">PREMIUM</span>
    <div id="title-version">v0.0.15</div>
</h1>
<div class="button-group">
    <button class="large-btn spacer"></button>
    <button id="home-story-btn" class="large-btn lightblue" onpointerup="location.href='#levels';">
        <span class="white-stroke" style="padding-right: 60px;">Story</span>
        <div style="position: absolute; width: 60px; top: 15px; right: 20px; line-height: 20px; text-align: right;">
            <span class="white-stroke" style="font-size: 24px; width: 60px;">play</span>
        </div>
        <completion-bar value="0"></completion-bar>
    </button>
    <button id="home-expert-btn" class="large-btn red" onpointerup="location.href='#expert-puzzles';">
        <span class="white-stroke" style="padding-right: 60px;">Expert</span>
        <div style="position: absolute; width: 60px; top: 15px; right: 20px; line-height: 20px; text-align: right;">
            <span class="white-stroke" style="font-size: 24px; width: 60px;">play</span>
        </div>
        <completion-bar value="0"></completion-bar>
    </button>
    <button id="home-premium-btn" class="large-btn blue" onpointerup="location.href='#premium-puzzles';">
        <span class="white-stroke" style="padding-right: 60px;">Puzzles</span>
        <div style="position: absolute; width: 60px; top: 15px; right: 20px; line-height: 20px; text-align: right;">
            <span class="white-stroke" style="font-size: 24px; width: 60px;">play</span>
        </div>
        <div class="premium-tag" style="bottom: 12px;">PREMIUM</div>
        <completion-bar value="0"></completion-bar>
    </button>
</div>
<div class="button-group">
    <button class="large-btn spacer"></button>
    <button id="home-community-btn" class="large-btn green" onpointerup="location.href='#community-puzzles';">
        <span class="white-stroke" style="padding-right: 60px;">Community</span>
        <div style="position: absolute; width: 60px; top: 15px; right: 20px; line-height: 20px; text-align: right;">
            <span class="white-stroke" style="font-size: 24px; width: 60px;">play</span>
        </div>
        <completion-bar value="0"></completion-bar>
    </button>
    <button id="home-board-btn" class="large-btn locked" style="display: none;"><stroke-text>LEADERBOARD</stroke-text></button>
    <button id="home-editor-btn" class="large-btn orange" onpointerup="location.href='#editor';" style="display: none;"><stroke-text>Puzzle Editor</stroke-text></button>
    <button id="home-options-btn" class="large-btn bluegrey locked" style="display: none;"><stroke-text>Options</stroke-text></button>
    <button id="home-credits-btn" class="large-btn bluegrey" onpointerup="location.href='#credits';"><stroke-text>Credits</stroke-text></button>
</div>
<button class="medium-btn common-fullscreen-btn fullscreen-btn lightblue"></button>
